<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Kompetencehus – Celle</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f4f6f8;
      padding: 40px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    /* TAG (ROLLE) */
    .roof {
      background: #2b6cb0;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: 600;
      border-radius: 6px 6px 0 0;
    }

    /* HUS (kun layout – ingen kant) */
    .house {
      background: transparent;
      padding: 30px 0;
    }

    .section-title {
      text-transform: uppercase;
      font-size: 13px;
      color: #555;
      margin: 10px 0 8px;
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .row + .row {
      margin-top: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
    }

    .box:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.12);
    }

    .choice {
      flex: 1;
      border-left: 6px solid #2b6cb0;
      background: #ebf8ff;
    }

    .foundation {
      width: 100%;
      border-left: 6px solid #4a5568;
      background: #e2e8f0;
    }

    .title {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .lms {
      font-size: 13px;
      color: #555;
    }

    /* INFO PANEL */
    .info {
      display: none;
      margin-top: 25px;
      padding: 20px;
      background: white;
      border-left: 6px solid #2b6cb0;
      border-radius: 6px;
    }
  </style>

  <script>
    function showInfo(title, description, lms) {
      document.getElementById("info").style.display = "block";
      document.getElementById("info-title").innerText = title;
      document.getElementById("info-description").innerText = description;
      document.getElementById("info-lms").innerText = "LMS-dokumentnr: " + lms;
    }
  </script>
</head>

<body>
  <div class="container">

    <!-- TAG -->
    <div class="roof">
      Learner Role: Celle
    </div>

    <!-- HUS -->
    <div class="house">

      <!-- VALG -->
      <div class="section-title">Specialisering (vælg én)</div>
      <div class="row">
        <div class="box choice"
             onclick="showInfo(
               'Rengøring',
               'Træning i rengøring og klargøring af celleområdet efter fastlagte standarder.',
               'LMS-CELLE-RENG-02'
             )">
          <div class="title">Rengøring</div>
          <div class="lms">LMS-CELLE-RENG-02</div>
        </div>

        <div class="box choice"
             onclick="showInfo(
               'Opsætning',
               'Træning i opsætning og forberedelse af celle før drift.',
               'LMS-CELLE-OPS-03'
             )">
          <div class="title">Opsætning</div>
          <div class="lms">LMS-CELLE-OPS-03</div>
        </div>
      </div>

      <!-- FUNDAMENT -->
      <div class="section-title">Fundament (skal gennemføres først)</div>
      <div class="row">
        <div class="box foundation"
             onclick="showInfo(
               'Basic 1',
               'Grundlæggende introduktion til arbejde i celle, sikkerhed og basisprocesser.',
               'LMS-CELLE-BASIC-01'
             )">
          <div class="title">Basic 1</div>
          <div class="lms">LMS-CELLE-BASIC-01</div>
        </div>
      </div>

      <!-- INFO -->
      <div id="info" class="info">
        <h3 id="info-title"></h3>
        <p id="info-description"></p>
        <p><strong id="info-lms"></strong></p>
      </div>

    </div>
  </div>
</body>
</html>
