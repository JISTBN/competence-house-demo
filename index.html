<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Kompetencehus – Celle</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f0f2f5;
      padding: 40px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    /* TAG */
    .roof {
      width: 0;
      height: 0;
      border-left: 300px solid transparent;
      border-right: 300px solid transparent;
      border-bottom: 140px solid #2b6cb0;
      margin: auto;
      position: relative;
    }

    .roof-title {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    /* HUS */
    .house {
      background: #ffffff;
      padding: 40px 20px;
      border: 2px solid #2b6cb0;
      border-top: none;
    }

    .section-title {
      text-transform: uppercase;
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .card {
      width: 220px;
      padding: 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .foundation {
      background: #e2e8f0;
      border-left: 6px solid #4a5568;
    }

    .choice {
      background: #ebf8ff;
      border-left: 6px solid #2b6cb0;
    }

    .card-title {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .lms {
      font-size: 13px;
      color: #555;
    }

    /* INFO PANEL */
    .info {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: #ffffff;
      border: 2px dashed #2b6cb0;
      text-align: left;
    }

    .info h3 {
      margin-top: 0;
    }
  </style>

  <script>
    function showInfo(title, description, lms) {
      document.getElementById("info").style.display = "block";
      document.getElementById("info-title").innerText = title;
      document.getElementById("info-description").innerText = description;
      document.getElementById("info-lms").innerText = "LMS-dokumentnr: " + lms;
    }
  </script>
</head>

<body>
  <div class="container">

    <!-- TAG -->
    <div class="roof">
      <div class="roof-title">Learner Role: Celle</div>
    </div>

    <!-- HUS -->
    <div class="house">

      <!-- SPECIALISERING -->
      <div class="section-title">Specialisering (vælg én)</div>
      <div class="cards">
        <div class="card choice"
             onclick="showInfo(
               'Rengøring',
               'Træning i rengøring og klargøring af celleområdet efter fastlagte standarder.',
               'LMS-CELLE-RENG-02'
             )">
          <div class="card-title">Rengøring</div>
          <div class="lms">LMS-CELLE-RENG-02</div>
        </div>

        <div class="card choice"
             onclick="showInfo(
               'Opsætning',
               'Træning i opsætning og forberedelse af celle før drift.',
               'LMS-CELLE-OPS-03'
             )">
          <div class="card-title">Opsætning</div>
          <div class="lms">LMS-CELLE-OPS-03</div>
        </div>
      </div>

      <!-- FUNDAMENT -->
      <div class="section-title">Fundament (skal gennemføres først)</div>
      <div class="cards">
        <div class="card foundation"
             onclick="showInfo(
               'Basic 1',
               'Grundlæggende introduktion til arbejde i celle, sikkerhed og basisprocesser.',
               'LMS-CELLE-BASIC-01'
             )">
          <div class="card-title">Basic 1</div>
          <div class="lms">LMS-CELLE-BASIC-01</div>
        </div>
      </div>

      <!-- INFO -->
      <div id="info" class="info">
        <h3 id="info-title"></h3>
        <p id="info-description"></p>
        <p><strong id="info-lms"></strong></p>
      </div>

    </div>
  </div>
</body>
</html>
